<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" width="860" height="470" font-family="'Times New Roman', serif">
  <defs>
    <marker id="arw2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="860" height="470" fill="#ffffff"/>

  <!-- INPUT -->
  <rect x="40" y="20" width="500" height="100" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="290" y="44" text-anchor="middle" font-size="15" font-weight="bold">INPUT: Konteks &amp; Regulasi</text>
  <text x="290" y="66" text-anchor="middle" font-size="12.5">Regulasi: UU 17/2003, UU 1/2004, PMK 62/2023,</text>
  <text x="290" y="83" text-anchor="middle" font-size="12.5">PP 50/2018, Perpres 16/2018 jo 12/2021, PER-5/PB/2024</text>
  <text x="290" y="105" text-anchor="middle" font-size="12.5" fill="#333">Rudenim: perbatasan • dominasi Belanja Modal • transisi TA 2025</text>

  <line x1="290" y1="120" x2="290" y2="138" stroke="#000" stroke-width="1.5" marker-end="url(#arw2)"/>

  <!-- PROSES -->
  <rect x="40" y="140" width="500" height="90" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="290" y="164" text-anchor="middle" font-size="15" font-weight="bold">PROSES: Pelaksanaan Belanja Modal</text>
  <text x="290" y="187" text-anchor="middle" font-size="13">Fase 1 Perencanaan &#8594; Fase 2 Penyusunan DIPA &#8594;</text>
  <text x="290" y="206" text-anchor="middle" font-size="13">Fase 3 Pelaksanaan (+ titik kritis tiap fase)</text>
  <text x="290" y="224" text-anchor="middle" font-size="12" font-style="italic" fill="#666">[menjawab RM 1 &amp; RM 2]</text>

  <line x1="290" y1="230" x2="290" y2="248" stroke="#000" stroke-width="1.5" marker-end="url(#arw2)"/>

  <!-- OUTPUT -->
  <rect x="40" y="250" width="500" height="74" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="290" y="274" text-anchor="middle" font-size="15" font-weight="bold">OUTPUT: Deviasi Halaman III DIPA</text>
  <text x="290" y="297" text-anchor="middle" font-size="13">RPD &#8800; Realisasi (underrun, bulan kritis, tren 2023-2025)</text>
  <text x="290" y="316" text-anchor="middle" font-size="12" font-style="italic" fill="#666">[menjawab RM 1]</text>

  <line x1="290" y1="324" x2="290" y2="342" stroke="#000" stroke-width="1.5" marker-end="url(#arw2)"/>

  <!-- OUTCOME -->
  <rect x="40" y="344" width="500" height="92" fill="#ececec" stroke="#000" stroke-width="1.5"/>
  <text x="290" y="368" text-anchor="middle" font-size="15" font-weight="bold">OUTCOME: Dampak</text>
  <text x="290" y="391" text-anchor="middle" font-size="13">IKPA turun • monitoring cost KPPN • residual loss •</text>
  <text x="290" y="410" text-anchor="middle" font-size="13">akuntabilitas melemah</text>
  <text x="290" y="429" text-anchor="middle" font-size="12" font-style="italic" fill="#666">[menjawab RM 3]</text>

  <!-- LENS -->
  <rect x="600" y="150" width="235" height="220" fill="#fafafa" stroke="#000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="717" y="178" text-anchor="middle" font-size="14" font-weight="bold">LENSA ANALISIS</text>
  <text x="717" y="200" text-anchor="middle" font-size="13" font-weight="bold" font-style="italic">Agency Theory</text>
  <text x="717" y="221" text-anchor="middle" font-size="12">(Jensen &amp; Meckling, 1976;</text>
  <text x="717" y="238" text-anchor="middle" font-size="12">Lane, 2003)</text>
  <text x="717" y="264" text-anchor="middle" font-size="12">hubungan principal-agent</text>
  <text x="717" y="281" text-anchor="middle" font-size="12">berlapis; deviasi dimaknai</text>
  <text x="717" y="298" text-anchor="middle" font-size="12">sebagai agency problem;</text>
  <text x="717" y="315" text-anchor="middle" font-size="12">respons: monitoring &amp;</text>
  <text x="717" y="332" text-anchor="middle" font-size="12">control via IKPA</text>

  <!-- dashed connectors from lens to main flow -->
  <line x1="600" y1="185" x2="542" y2="185" stroke="#000" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arw2)"/>
  <line x1="600" y1="335" x2="542" y2="390" stroke="#000" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arw2)"/>
</svg>
