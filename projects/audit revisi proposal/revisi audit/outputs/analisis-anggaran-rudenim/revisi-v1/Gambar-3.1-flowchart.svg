<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" width="820" height="470" font-family="'Times New Roman', serif">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="470" fill="#ffffff"/>

  <!-- FASE 1 -->
  <rect x="110" y="20" width="600" height="96" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="410" y="45" text-anchor="middle" font-size="15" font-weight="bold">FASE 1 - PERENCANAAN (T-1)</text>
  <text x="410" y="68" text-anchor="middle" font-size="13">Penyusunan RKA-K/L  •  Estimasi HPS/RAB  •  Jadwal pengadaan</text>
  <text x="410" y="91" text-anchor="middle" font-size="12" font-style="italic" fill="#444">Titik kritis: estimasi harga tidak akurat, TOR/RAB kurang detail,</text>
  <text x="410" y="107" text-anchor="middle" font-size="12" font-style="italic" fill="#444">asumsi waktu pengadaan terlalu optimistik</text>

  <line x1="410" y1="116" x2="410" y2="134" stroke="#000" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- FASE 2 -->
  <rect x="110" y="136" width="600" height="96" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="410" y="161" text-anchor="middle" font-size="15" font-weight="bold">FASE 2 - PENYUSUNAN DIPA</text>
  <text x="410" y="184" text-anchor="middle" font-size="13">DIPA terbit  •  RPD Halaman III (rencana kas bulanan)</text>
  <text x="410" y="207" text-anchor="middle" font-size="12" font-style="italic" fill="#444">Titik kritis: RPD terlalu optimistik; tanpa slack waktu</text>
  <text x="410" y="223" text-anchor="middle" font-size="12" font-style="italic" fill="#444">untuk kelengkapan dokumen pihak ketiga</text>

  <line x1="410" y1="232" x2="410" y2="250" stroke="#000" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- FASE 3 -->
  <rect x="110" y="252" width="600" height="116" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="410" y="277" text-anchor="middle" font-size="15" font-weight="bold">FASE 3 - PELAKSANAAN BELANJA MODAL</text>
  <text x="410" y="300" text-anchor="middle" font-size="13">Pengadaan: tender  &#8594;  kontrak  &#8594;  progres fisik  &#8594;  BAST</text>
  <text x="410" y="320" text-anchor="middle" font-size="13">Pencairan: SPP  &#8594;  SPM  &#8594;  SP2D</text>
  <text x="410" y="343" text-anchor="middle" font-size="12" font-style="italic" fill="#444">Titik kritis: tender gagal, progres terlambat, BAST tertunda,</text>
  <text x="410" y="359" text-anchor="middle" font-size="12" font-style="italic" fill="#444">revisi SPP, bottleneck verifikasi PPSPM, blokir anggaran</text>

  <line x1="410" y1="368" x2="410" y2="386" stroke="#000" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- OUTPUT -->
  <rect x="110" y="388" width="600" height="64" fill="#ececec" stroke="#000" stroke-width="1.5"/>
  <text x="410" y="414" text-anchor="middle" font-size="15" font-weight="bold">OUTPUT: DEVIASI HALAMAN III DIPA</text>
  <text x="410" y="437" text-anchor="middle" font-size="13">RPD &#8800; Realisasi (underrun Belanja Modal, bulan kritis)</text>
</svg>
