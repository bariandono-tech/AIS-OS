name: Notion to Supabase Sync Engine

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub Action tab

jobs:
  sync:
    name: Sync Notion Content to Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: projects/studios/app/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: projects/studios/app

      - name: Run Sync Engine
        run: npm run sync
        working-directory: projects/studios/app
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_STACKS_DB_ID: ${{ secrets.NOTION_STACKS_DB_ID }}
          NOTION_CONTENT_DB_ID: ${{ secrets.NOTION_CONTENT_DB_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
